<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - TechShop</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
<header>
    <div class="container">
        <div class="header-content">
            <div class="logo"><a href="index.html" style="color:white; text-decoration:none;">Tech<span>Shop</span></a></div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                    <li><a href="cart.html">Корзина</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <a href="login.html" class="btn-login auth-guest">Войти</a>
                <a href="register.html" class="btn-register auth-guest">Регистрация</a>
                <span class="user-name auth-user"></span>
                <a href="#" id="logoutBtn" class="btn-logout auth-user">Выйти</a>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <h1>📝 Регистрация</h1>
        <div id="message"></div>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Имя</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Подтверждение пароля</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>
        <div class="auth-footer">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="footer-content">
            <div class="footer-section">
                <h3>TechShop</h3>
                <p>Лучшая компьютерная техника с 2026 года</p>
            </div>
            <div class="footer-section">
                <h4>Контакты</h4>
                <p>📞 +7 (800) 123-45-67</p>
                <p>✉️ info@techshop.ru</p>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2026 TechShop</p>
        </div>
    </div>
</footer>

<script src="../scripts/auth.js"></script>
<script>
    const registerForm = document.getElementById('registerForm');
    const messageDiv = document.getElementById('message');

    registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        const validation = AuthUtils.validateRegistrationForm({ name, email, password, confirmPassword });

        if (!validation.isValid) {
            const errors = validation.errors;
            let errorMsg = '';
            if (errors.name) errorMsg += errors.name + '<br>';
            if (errors.email) errorMsg += errors.email + '<br>';
            if (errors.password) errorMsg += errors.password + '<br>';
            if (errors.confirmPassword) errorMsg += errors.confirmPassword + '<br>';
            messageDiv.innerHTML = '<div class="message error">❌ ' + errorMsg + '</div>';
            return;
        }

        const result = auth.register({ name, email, password });

        if (result.success) {
            messageDiv.innerHTML = '<div class="message success">✅ Регистрация успешна! Перенаправление...</div>';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        } else {
            messageDiv.innerHTML = '<div class="message error">❌ ' + result.error + '</div>';
        }
    });
</script>
</body>
</html>
