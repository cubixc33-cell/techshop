<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechShop - Магазин компьютерной техники</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #4a69bd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader-container {
            text-align: center;
            color: white;
            animation: fadeIn 1s ease;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .logo span {
            color: #ff9f43;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #ff9f43;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        .loading-text {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .redirect-link {
            color: #ff9f43;
            text-decoration: none;
            font-size: 14px;
        }
        .redirect-link:hover {
            text-decoration: underline;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="loader-container">
    <div class="logo">Tech<span>Shop</span></div>
    <div class="spinner"></div>
    <div class="loading-text">Загрузка магазина...</div>
    <a href="pages/index.html" class="redirect-link">Перейти на главную →</a>
</div>
<script>
    setTimeout(function() {
        window.location.href = 'pages/index.html';
    }, 1500);
</script>
</body>
</html>
